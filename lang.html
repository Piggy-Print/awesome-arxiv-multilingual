<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language — PiggyPrint Translated Docs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back">← All Languages</a>
            <h1 id="pageTitle">Loading...</h1>
            <p id="pageSubtitle"></p>
        </header>

        <div id="bookList">
            <!-- rendered by JavaScript -->
        </div>

        <footer>
            <p>Powered by <a href="https://piggyprint.gumroad.com/" target="_blank">PiggyPrint</a></p>
        </footer>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const langCode = params.get('code');

        if (!langCode) {
            document.getElementById('bookList').innerHTML =
                '<p class="error">⚠️ No language specified. <a href="index.html">Go back to home</a>.</p>';
        } else {
            fetch('data.json')
                .then(res => {
                    if (!res.ok) throw new Error('Failed to load data');
                    return res.json();
                })
                .then(books => {
                    // Find the language name from any book that has it
                    let langName = langCode;
                    for (const book of books) {
                        const found = book.languages.find(l => l.code === langCode);
                        if (found) {
                            langName = found.name;
                            break;
                        }
                    }

                    // Filter books that have this language
                    const filtered = books
                        .map(book => {
                            const match = book.languages.find(l => l.code === langCode);
                            return match ? { title: book.title, gumroad: match.gumroad, langName: match.name } : null;
                        })
                        .filter(Boolean);

                    document.title = `${langName} — PiggyPrint Translated Docs`;
                    document.getElementById('pageTitle').textContent = `📖 ${langName}`;
                    document.getElementById('pageSubtitle').textContent =
                        `${filtered.length} book${filtered.length > 1 ? 's' : ''} available`;

                    const container = document.getElementById('bookList');
                    if (filtered.length === 0) {
                        container.innerHTML = `<p class="error">No books found in this language.</p>`;
                        return;
                    }

                    container.innerHTML = filtered.map(book => `
                        <div class="book-card">
                            <h2>${escapeHtml(book.title)}</h2>
                            <a href="https://piggyprint.gumroad.com/l/${book.gumroad}"
                               target="_blank"
                               rel="noopener noreferrer"
                               class="buy-btn">🛒 Buy — $9.99</a>
                        </div>
                    `).join('');
                })
                .catch(err => {
                    document.getElementById('bookList').innerHTML =
                        '<p class="error">⚠️ Failed to load data. Please try again later.</p>';
                    console.error(err);
                });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
