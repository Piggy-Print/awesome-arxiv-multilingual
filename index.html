<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiggyPrint Translated Docs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 PiggyPrint Translated Docs</h1>
            <p>Multilingual lecture notes & books</p>
        </header>

        <nav class="lang-nav" id="langNav">
            <!-- language quick links rendered by JS -->
        </nav>

        <div id="bookList">
            <!-- rendered by JavaScript -->
        </div>

        <footer>
            <p>Powered by <a href="https://piggyprint.gumroad.com/" target="_blank">PiggyPrint</a></p>
        </footer>
    </div>

    <script>
        fetch('data.json')
            .then(res => {
                if (!res.ok) throw new Error('Failed to load data');
                return res.json();
            })
            .then(books => {
                // Collect all unique languages across books
                const langMap = new Map();
                books.forEach(book => {
                    book.languages.forEach(lang => {
                        if (!langMap.has(lang.code)) {
                            langMap.set(lang.code, { code: lang.code, name: lang.name, count: 0 });
                        }
                        langMap.get(lang.code).count++;
                    });
                });
                const allLangs = [...langMap.values()];

                // Render language nav
                document.getElementById('langNav').innerHTML = `
                    <span class="nav-label">Browse by language:</span>
                    ${allLangs.map(lang => `
                        <a href="lang.html?code=${lang.code}" class="nav-btn">
                            ${escapeHtml(lang.name)} (${lang.count})
                        </a>
                    `).join('')}
                `;

                // Render book list
                const container = document.getElementById('bookList');
                container.innerHTML = books.map(book => `
                    <div class="book-card">
                        <h2>${escapeHtml(book.title)}</h2>
                        <div class="lang-links">
                            ${book.languages.map(lang => `
                                <a href="lang.html?code=${lang.code}" class="lang-btn">
                                    ${escapeHtml(lang.name)}
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('bookList').innerHTML =
                    '<p class="error">⚠️ Failed to load data. Please try again later.</p>';
                console.error(err);
            });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
