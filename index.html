<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiggyPrint 翻译文档</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 PiggyPrint 翻译文档</h1>
            <p>多语言翻译版讲义与书籍</p>
        </header>

        <div id="bookList">
            <!-- 由 JavaScript 动态渲染 -->
        </div>

        <footer>
            <p>Powered by <a href="https://piggyprint.gumroad.com/" target="_blank">PiggyPrint</a></p>
        </footer>
    </div>

    <script>
        fetch('data.json')
            .then(res => {
                if (!res.ok) throw new Error('Failed to load data');
                return res.json();
            })
            .then(books => {
                const container = document.getElementById('bookList');
                container.innerHTML = books.map(book => `
                    <div class="book-card">
                        <h2>${escapeHtml(book.title)}</h2>
                        <div class="lang-links">
                            ${book.languages.map(lang => `
                                <a href="https://piggyprint.gumroad.com/l/${lang.gumroad}"
                                   target="_blank"
                                   rel="noopener noreferrer"
                                   class="lang-btn">
                                    ${escapeHtml(lang.name)}
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('bookList').innerHTML =
                    '<p class="error">⚠️ 数据加载失败，请稍后重试。</p>';
                console.error(err);
            });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
